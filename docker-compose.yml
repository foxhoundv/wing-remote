# ─────────────────────────────────────────────────────────────────────────────
# WING Remote — docker-compose.yml
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker compose up --build          # first run
#   docker compose up -d               # detached / background
#   docker compose logs -f wing-remote # follow logs
#   docker compose down                # stop and remove containers
# ─────────────────────────────────────────────────────────────────────────────
#
# WINDOWS NOTE:
#   network_mode: host does NOT work on Windows Docker (Docker runs inside a
#   WSL2/Hyper-V VM, so "host" binds to the VM's interface, not your PC's).
#   We use bridge mode with explicit port mappings instead. All UDP ports that
#   Wing sends packets TO must be listed here or they will be silently dropped.
# ─────────────────────────────────────────────────────────────────────────────

services:

  wing-remote:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wing-remote
    restart: unless-stopped

    # ── Network ──────────────────────────────────────────────────────────────
    # Bridge mode with explicit port mapping — required on Windows.
    # Port layout:
    #   8000/tcp  — FastAPI web UI (browser connects here)
    #   2224/udp  — OSC subscription push events (Wing → container)
    #               Wing is told to send events to host:2224 via /%2224/*S
    #   2222/udp  — Wing meter data (Wing → container, native binary protocol)
    #   2223/udp  — Wing OSC server (container → Wing outbound; Wing replies
    #               back to source port 2224, so this is outbound only)
    ports:
      - "8000:8000"          # Web UI
      - "2224:2224/udp"      # OSC subscription event receiver
      - "2222:2222/udp"      # Meter data receiver (native binary)

    # ── Audio device access ───────────────────────────────────────────────────
    privileged: true

    # ── Volumes ──────────────────────────────────────────────────────────────
    volumes:
      - recordings:/recordings
      - snapshots:/snapshots
      - ./.env:/app/.env
      - ./docker-compose.yml:/app/docker-compose.yml
      - /var/run/docker.sock:/var/run/docker.sock

    # ── Environment ──────────────────────────────────────────────────────────
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1

    # ── Resource limits ───────────────────────────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

    # ── Logging ───────────────────────────────────────────────────────────────
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

    # ── Health ────────────────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s


# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  recordings:
    driver: local
  snapshots:
    driver: local