# ─────────────────────────────────────────────────────────────────────────────
# WING Remote — docker-compose.yml
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker compose up --build          # first run
#   docker compose up -d               # detached / background
#   docker compose logs -f wing-remote # follow logs
#   docker compose down                # stop and remove containers
# ─────────────────────────────────────────────────────────────────────────────
#
# WINDOWS NOTE:
#   network_mode: host does NOT work on Windows Docker (Docker runs inside a
#   WSL2/Hyper-V VM, so "host" binds to the VM's interface, not your PC's).
#   This file uses bridge mode with explicit port mappings instead. All ports
#   that Wing sends packets to must be listed here or they will be dropped.
#
# LINUX / MACOS NOTE:
#   If you are on Linux and want simpler networking (no NAT), replace the
#   ports: block with:  network_mode: host
#   macOS Docker Desktop does not support host networking either.
# ─────────────────────────────────────────────────────────────────────────────
#
# PORT REFERENCE:
#
#   8000/tcp  Web UI (browser → container)
#
#   2224/udp  OSC receive port (Wing → container, subscription push events)
#             Wing is told to send events here via the /%2224/*S command.
#             Must match LOCAL_OSC_PORT in .env (default: 2224).
#
#   2222/tcp  Wing binary meter interface (container → Wing, TCP OUTBOUND)
#             The container opens a TCP connection to Wing on this port to
#             subscribe to hardware meter data. Outbound TCP does not need
#             a port mapping, but listing it here makes the intent clear.
#             NOTE: this is TCP, NOT UDP.
#
#   2225/udp  Meter data receiver (Wing → container, UDP)
#             Wing sends binary meter packets to this UDP port in response
#             to the TCP meter subscription. Must match METER_UDP_PORT in
#             .env (default: 2225).
#
# ─────────────────────────────────────────────────────────────────────────────

services:

  wing-remote:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wing-remote
    restart: unless-stopped

    # ── Network ──────────────────────────────────────────────────────────────
    ports:
      - "8000:8000"           # Web UI (TCP)
      - "2224:2224/udp"       # OSC subscription push events (Wing → container)
      - "2225:2225/udp"       # Meter UDP data         (Wing → container)
      # 2222/tcp is OUTBOUND (container opens TCP to Wing) — no mapping needed
      # 2223/udp is Wing's OSC server port (outbound only) — no mapping needed

    # ── Audio device access ───────────────────────────────────────────────────
    # privileged: true lets entrypoint.sh detect /dev/snd at runtime
    # and configure audio group access for USB recording.
    privileged: true

    # ── Volumes ──────────────────────────────────────────────────────────────
    volumes:
      - recordings:/recordings        # WAV recording storage (Docker-managed)
      - snapshots:/snapshots          # Scene/snapshot files  (Docker-managed)
      - ./.env:/app/.env              # Setup Wizard writes Wing IP, ports, etc.
      - ./docker-compose.yml:/app/docker-compose.yml  # Readable by Setup Wizard
      - /var/run/docker.sock:/var/run/docker.sock      # Enables auto-restart from UI

    # ── Environment ──────────────────────────────────────────────────────────
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1

    # ── Resource limits ───────────────────────────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

    # ── Logging ───────────────────────────────────────────────────────────────
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

    # ── Health ────────────────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s


# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  recordings:
    driver: local
  snapshots:
    driver: local
