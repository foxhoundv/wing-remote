# ─────────────────────────────────────────────────────────────────────────────
# WING Remote — docker-compose.yml
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker compose up --build          # first run
#   docker compose up -d               # detached / background
#   docker compose logs -f wing-remote # follow logs
#   docker compose down                # stop and remove containers
# ─────────────────────────────────────────────────────────────────────────────

services:

  wing-remote:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wing-remote
    restart: unless-stopped

    # ── Network ──────────────────────────────────────────────────────────────
    # host mode gives the container direct UDP access for OSC (no NAT issues)
    # and also makes /dev/snd devices visible without a devices: block.
    # Wing OSC port is always 2223. LOCAL_OSC_PORT (default 2224) is the port
    # this container listens on for Wing subscription push events.
    network_mode: host

    # ── Audio device access ───────────────────────────────────────────────────
    # privileged: true lets the entrypoint script detect /dev/snd at runtime
    # and add the container user to the audio group if devices are present.
    # This is safe here because the Docker socket is already mounted (which
    # grants equivalent host access). Remove if you don't need audio recording.
    privileged: true

    # ── Volumes ──────────────────────────────────────────────────────────────
    volumes:
      - recordings:/recordings       # WAV recording storage (Docker-managed)
      - snapshots:/snapshots         # Scene/snapshot files  (Docker-managed)
      - ./.env:/app/.env             # Setup Wizard writes Wing IP, ports, etc.
      - ./docker-compose.yml:/app/docker-compose.yml  # Readable by Setup Wizard
      - /var/run/docker.sock:/var/run/docker.sock      # Enables auto-restart from UI

    # ── Environment ──────────────────────────────────────────────────────────
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1

    # ── Resource limits ───────────────────────────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

    # ── Logging ───────────────────────────────────────────────────────────────
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

    # ── Health ────────────────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s


# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  recordings:
    driver: local
  snapshots:
    driver: local
